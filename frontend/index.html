<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>S3 CCTV Retrieval Portal</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>S3 CCTV Retrieval Portal</h1>
      <p class="subtitle">Retrieve footage by location, camera, day and time range.</p>

      <section class="card" id="authCard">
        <h2>Account Access</h2>
        <div class="tabs">
          <button id="showLoginBtn" class="active">Login</button>
          <button id="showRegisterBtn">Create Account</button>
        </div>

        <form id="loginForm">
          <label>Email<input type="email" id="loginEmail" required /></label>
          <label>Password<input type="password" id="loginPassword" required /></label>
          <button type="submit">Login</button>
        </form>

        <form id="registerForm" class="hidden">
          <label>Full Name<input type="text" id="registerName" required /></label>
          <label>Email<input type="email" id="registerEmail" required /></label>
          <label>Password<input type="password" id="registerPassword" minlength="8" required /></label>
          <button type="submit">Create Account</button>
        </form>
      </section>

      <section class="card hidden" id="searchCard">
        <h2>Retrieve Footage</h2>
        <p id="welcomeLabel"></p>

        <div class="grid">
          <label>Location<select id="locationSelect"><option value="">Select location</option></select></label>
          <label>Camera<select id="cameraSelect" disabled><option value="">Select camera</option></select></label>
          <label>Day<select id="daySelect" disabled><option value="">Select day</option></select></label>
          <label>Start Hour (0-23)<input type="number" min="0" max="23" value="0" id="startHour" /></label>
          <label>End Hour (0-23)<input type="number" min="0" max="23" value="23" id="endHour" /></label>
        </div>

        <div class="actions">
          <button id="searchBtn">Search Footage</button>
          <button id="logoutBtn" class="secondary">Logout</button>
        </div>

        <div id="results"></div>
      </section>

      <p id="status"></p>
    </main>

    <script src="/assets/app.js"></script>
  </body>
  </html>
